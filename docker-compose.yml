version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: vinasofware_postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: vinasoftware_v2
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d vinasoftware_v2"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: vinasoftware_api
    restart: always
    ports:
      - "8080:8080"
    environment:
      # "postgres" là tên service ở trên, Docker tự resolve thành IP nội bộ
      DATABASE_URL: "postgresql://admin:password123@postgres:5432/vinasoftware_v2?schema=public"
      JWT_SECRET: "SE161632SE161632SE161632SE161632"
      PORT: 8080
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
